<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories</title>
    <link rel="stylesheet" href="../public/style/inpublic.css">
</head>
<body>
    
    <header class="header">
         <a href="../index.html" class="header-icon back-button">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 18L9 12L15 6" stroke="var(--text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <a href="../index.html" class="logo">
            <p>play.apricate.cloud</p>
        </a>
        <div class="header-icons">
            
        </div>
    </header>
    
    <div class="ads" style="margin-top: 50px;">
        <div id="div-gpt-ad-category1"></div>
    </div>

    <main class="main-content category-page-main">
        <div class="category-page-container">
            <div class="category-navigation">
                <div class="category-bar">
                    <div class="category-scroll-container">
                        <div class="category-buttons" id="categoryButtons">

            <div class="category-content">

    <div class="ads">
        <div id="div-gpt-ad-category2"></div>
    </div>
    
    <a href="../index.html" class="home-float-button" title="back to home">
        <img src="../public/images/home.png" alt="Home" class="home-float-button-image">
    </a>

    
<script type="module" src="../public/js/inpublic.js"></script>
<script type="module">
      import { ad_code_identifier } from "../ads.js";
    
      if (ad_code_identifier.cate == "adx" && ad_code_identifier.status == 1) {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "../categorygg.js";
        document.body.appendChild(script);
      } else {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "../categorygg_ads.js";
        document.body.appendChild(script);
      }
    </script>
</body>
</html>
