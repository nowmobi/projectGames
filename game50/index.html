<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资讯头条 - 最新资讯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gray-50">
    <header class="bg-white shadow-sm sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center">
          <h1 class="text-2xl font-bold text-blue-600 cursor-pointer hover:text-blue-700 transition-colors">
            资讯头条
          </h1>
          <span class="ml-2 text-sm text-gray-400">News Headlines</span>
        </div>
        <div class="relative w-64">
          <input
            id="searchInput"
            type="text"
            placeholder="搜索资讯..."
            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            onkeyup="handleSearch(event)"
          />
          <button
            class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-blue-500 transition-colors"
            onclick="handleSearch()"
          >
            <span class="material-icons text-sm">search</span>
          </button>
        </div>
      </div>
    </header>

    <div class="bg-white border-b">
      <div class="max-w-6xl mx-auto px-4 py-3">
        <div id="categoryContainer" class="flex items-center gap-3 overflow-x-auto py-1">
          <div class="flex items-center justify-center py-4">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-500"></div>
          </div>
        </div>
      </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-8">
      <div class="flex gap-8">
        <div class="flex-1">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-gray-800">最新资讯</h2>
            <span id="resultCount" class="text-sm text-gray-400">共 0 条</span>
          </div>
          <div id="newsContainer">
            <div class="flex justify-center items-center py-12">
              <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            </div>
          </div>
        </div>

        <aside class="w-72 flex-shrink-0 hidden lg:block">
          <div class="bg-white rounded-xl shadow-md p-4 mb-4">
            <h3 class="font-semibold text-gray-800 mb-4 pb-2 border-b">热门资讯</h3>
            <div id="hotNewsContainer" class="space-y-3">
              <div class="flex items-center justify-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-md p-4">
            <h3 class="font-semibold text-gray-800 mb-4 pb-2 border-b">推荐阅读</h3>
            <div id="recommendContainer" class="space-y-4">
              <div class="flex items-center justify-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-8 mt-8">
      <div class="max-w-6xl mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center">
          <div class="mb-4 md:mb-0">
            <span class="text-white font-bold text-lg">资讯头条</span>
            <p class="text-sm mt-1">提供最新、最全的资讯信息</p>
          </div>
          <div class="flex space-x-6 text-sm">
            <a href="#" class="hover:text-white transition-colors">关于我们</a>
            <a href="#" class="hover:text-white transition-colors">联系我们</a>
            <a href="#" class="hover:text-white transition-colors">隐私政策</a>
            <a href="#" class="hover:text-white transition-colors">使用条款</a>
          </div>
        </div>
        <div class="text-center mt-6 pt-4 border-t border-gray-700 text-sm">
          <p>© 2024 资讯头条. 保留所有权利.</p>
        </div>
      </div>
    </footer>

    <script>
      const BASE_URL = 'https://news-api.szwyi.com/api/compatible';
      const CATEGORY_URL = 'https://news-api.szwyi.com/api/compatible/finance_info/db.json?num=40&thirdCategoryIds=2234,2235,2236,2237,2238,2239,2240';
      
      let newsData = [];
      let searchKeyword = '';
      let activeCategory = 'all';

      async function fetchNewsData() {
        try {
          const response = await fetch(CATEGORY_URL);
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          const data = await response.json();
          newsData = data.data || data;
          renderCategories();
          renderNewsList();
          renderHotNews();
          renderRecommend();
        } catch (error) {
          console.error('Error fetching news:', error);
          newsData = getMockData();
          renderCategories();
          renderNewsList();
          renderHotNews();
          renderRecommend();
        }
      }

      function getMockData() {
        return [
          {
            id: 1,
            title: '2024年全球经济展望：挑战与机遇并存',
            summary: '随着全球经济逐渐复苏，各国政府和企业面临着前所未有的挑战和机遇。本文深入分析了当前全球经济形势和未来发展趋势。',
            imageUrl: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300&h=200&fit=crop',
            categoryName: '财经',
            info1: '财经',
            publishTime: '2024-01-15T10:30:00',
            viewCount: '12,532'
          },
          {
            id: 2,
            title: '人工智能技术突破：GPT-5或将带来革命性变化',
            summary: '最新消息显示，GPT-5的研发取得重大进展，预计将在自然语言处理方面实现质的飞跃，推动AI应用进入新阶段。',
            imageUrl: 'https://images.unsplash.com/photo-1677442136106-4465f0c31b50?w=300&h=200&fit=crop',
            categoryName: '科技',
            info1: '科技',
            publishTime: '2024-01-14T14:20:00',
            viewCount: '28,910'
          },
          {
            id: 3,
            title: '新能源汽车市场持续火热，销量再创历史新高',
            summary: '2023年新能源汽车销量突破千万辆大关，各大车企纷纷加大研发投入，市场竞争日益激烈，技术创新不断涌现。',
            imageUrl: 'https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=300&h=200&fit=crop',
            categoryName: '汽车',
            info1: '汽车',
            publishTime: '2024-01-13T09:15:00',
            viewCount: '18,456'
          },
          {
            id: 4,
            title: '健康生活方式成为新趋势，运动健身产业蓬勃发展',
            summary: '越来越多的人开始关注健康生活，运动健身APP下载量持续增长，健身房会员数量稳步上升，健康产业迎来黄金期。',
            imageUrl: 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=300&h=200&fit=crop',
            categoryName: '健康',
            info1: '健康',
            publishTime: '2024-01-12T16:45:00',
            viewCount: '9,876'
          },
          {
            id: 5,
            title: '全球气候变化峰会取得重要共识',
            summary: '各国代表达成多项重要协议，承诺共同应对气候变化挑战，推动可持续发展目标实现，绿色经济成为新增长点。',
            imageUrl: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=300&h=200&fit=crop',
            categoryName: '环保',
            info1: '环保',
            publishTime: '2024-01-11T11:30:00',
            viewCount: '35,210'
          },
          {
            id: 6,
            title: '5G技术全面普及，数字生活迎来新篇章',
            summary: '5G网络覆盖范围不断扩大，应用场景日益丰富，智慧城市、远程医疗、自动驾驶等领域迎来飞速发展。',
            imageUrl: 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=300&h=200&fit=crop',
            categoryName: '科技',
            info1: '科技',
            publishTime: '2024-01-10T15:20:00',
            viewCount: '22,345'
          },
          {
            id: 7,
            title: '教育改革新政策出台，素质教育成重点',
            summary: '教育部发布新政策，强调素质教育的重要性，推动教育公平，培养全面发展的新时代人才。',
            imageUrl: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=300&h=200&fit=crop',
            categoryName: '教育',
            info1: '教育',
            publishTime: '2024-01-09T10:00:00',
            viewCount: '15,678'
          },
          {
            id: 8,
            title: '世界杯精彩纷呈，足球热潮席卷全球',
            summary: '本届世界杯赛事精彩纷呈，各支球队展现出高水平竞技状态，足球运动在全球范围内掀起新的热潮。',
            imageUrl: 'https://images.unsplash.com/photo-1546519638-68e109498ffc?w=300&h=200&fit=crop',
            categoryName: '体育',
            info1: '体育',
            publishTime: '2024-01-08T20:30:00',
            viewCount: '45,890'
          }
        ];
      }

      function formatTime(time) {
        if (!time) return '未知时间';
        const date = new Date(time);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day} ${hours}:${minutes}`;
      }

      function getFilteredNews() {
        let result = newsData;
        if (activeCategory !== 'all') {
          result = result.filter(item => item.info1 === activeCategory);
        }
        if (searchKeyword) {
          result = result.filter(item =>
            item.title?.includes(searchKeyword) ||
            item.description?.includes(searchKeyword) ||
            item.summary?.includes(searchKeyword)
          );
        }
        return result;
      }

      function renderNewsList() {
        const container = document.getElementById('newsContainer');
        const filtered = getFilteredNews();
        
        document.getElementById('resultCount').textContent = `共 ${filtered.length} 条`;

        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="text-center py-12">
              <div class="text-gray-400 mb-2">
                <span class="material-icons text-6xl">newspaper</span>
              </div>
              <p class="text-gray-500">暂无资讯内容</p>
            </div>
          `;
          return;
        }

        container.innerHTML = filtered.map(item => `
          <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow cursor-pointer group mb-4">
            <div class="flex flex-col md:flex-row">
              <div class="md:w-48 h-40 md:h-auto relative overflow-hidden flex-shrink-0">
                <img
                  src="${item.img || item.imageUrl || item.picUrl || 'https://via.placeholder.com/300x200'}"
                  alt="${item.title}"
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                />
                <div class="absolute top-2 left-2">
                  <span class="bg-blue-500 text-white text-xs px-2 py-1 rounded-full">
                    ${item.categoryName || item.channelName || '资讯'}
                  </span>
                </div>
              </div>
              <div class="flex-1 p-4 flex flex-col justify-between">
                <div>
                  <h3 class="text-lg font-semibold text-gray-800 mb-2 line-clamp-2 group-hover:text-blue-600 transition-colors">
                    ${item.title}
                  </h3>
                  <p class="text-gray-500 text-sm line-clamp-2 mb-3">
                    ${item.summary || item.description || item.content || '暂无摘要'}
                  </p>
                </div>
                <div class="flex items-center justify-between text-gray-400 text-xs">
                  <span class="flex items-center">
                    <span class="material-icons text-xs mr-1">access_time</span>
                    ${formatTime(item.publishTime || item.createTime)}
                  </span>
                  <span class="flex items-center">
                    <span class="material-icons text-xs mr-1">visibility</span>
                    ${item.viewCount || '阅读量未知'}
                  </span>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      }

      function renderCategories() {
        const container = document.getElementById('categoryContainer');
        const categories = [...new Set(newsData.map(item => item.info1).filter(Boolean))];
        
        let html = '';
        
        html += `
          <button
            class="px-5 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap transition-all bg-blue-600 text-white shadow-md hover:bg-blue-700 hover:shadow-lg flex-shrink-0"
            onclick="filterCategory('all')"
          >
            全部
          </button>
        `;
        
        categories.forEach(cat => {
          html += `
            <button
              class="px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 hover:border-gray-400 flex-shrink-0"
              onclick="filterCategory('${cat}')"
            >
              ${cat}
            </button>
          `;
        });
        
        container.innerHTML = html;
      }

      function renderHotNews() {
        const container = document.getElementById('hotNewsContainer');
        const hotNews = [...newsData].sort((a, b) => 
          (parseInt(b.viewCount?.replace(/[^0-9]/g, '')) || 0) - 
          (parseInt(a.viewCount?.replace(/[^0-9]/g, '')) || 0)
        ).slice(0, 5);

        container.innerHTML = hotNews.map((item, index) => `
          <div class="flex items-start cursor-pointer group">
            <span class="${index < 3 ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-600'} w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold mr-3 flex-shrink-0">
              ${index + 1}
            </span>
            <div class="flex-1 min-w-0">
              <p class="text-sm text-gray-700 truncate group-hover:text-blue-600 transition-colors">
                ${item.title}
              </p>
              <p class="text-xs text-gray-400 mt-1">${item.viewCount}</p>
            </div>
          </div>
        `).join('');
      }

      function renderRecommend() {
        const container = document.getElementById('recommendContainer');
        const recommend = newsData.slice(0, 3);

        container.innerHTML = recommend.map(item => `
          <div class="flex cursor-pointer group">
            <img
              src="${item.img || item.imageUrl || item.picUrl || 'https://via.placeholder.com/100x80'}"
              alt="${item.title}"
              class="w-24 h-16 object-cover rounded-lg flex-shrink-0 group-hover:opacity-80 transition-opacity"
            />
            <div class="ml-3 flex-1 min-w-0">
              <p class="text-sm text-gray-700 line-clamp-2 group-hover:text-blue-600 transition-colors">
                ${item.title}
              </p>
            </div>
          </div>
        `).join('');
      }

      function handleSearch(event) {
        if (event && event.key !== 'Enter') return;
        searchKeyword = document.getElementById('searchInput').value.trim();
        renderNewsList();
      }

      function filterCategory(category) {
        activeCategory = category;
        document.querySelectorAll('#categoryContainer button').forEach(btn => {
          btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md', 'hover:bg-blue-700', 'hover:shadow-lg');
          btn.classList.add('bg-white', 'text-gray-700', 'border', 'border-gray-300', 'hover:bg-gray-50', 'hover:border-gray-400');
        });
        event.target.classList.remove('bg-white', 'text-gray-700', 'border', 'border-gray-300', 'hover:bg-gray-50', 'hover:border-gray-400');
        event.target.classList.add('bg-blue-600', 'text-white', 'shadow-md', 'hover:bg-blue-700', 'hover:shadow-lg');
        renderNewsList();
      }

      document.addEventListener('DOMContentLoaded', fetchNewsData);
    </script>
  </body>
</html>
