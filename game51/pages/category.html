<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category</title>
    <link rel="stylesheet" href="../public/style/inpublic.css" />
  </head>
  <body class="category-page">
    <header class="header">
      <div class="header-content">
        <a href="../index.html" class="logo">
          <p>seapeacez.com</p>
        </a>
        <div class="header-icons">
          <a href="#" class="header-icon" id="searchToggle">🔍</a>
          <a href="#" class="header-icon" id="menuToggle">
            <img src="../public/category.png" alt="Categories" class="category-icon">
          </a>
        </div>
      </div>
    </header>

    <div class="search-container" id="searchContainer">
      <div class="search-input">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search games..." />
        <span class="close-search" id="closeSearch">✕</span>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="categories-menu" id="categoriesMenu">
      <div class="categories-header">
        <span class="categories-title">Categories</span>
        <span class="close-categories" id="closeCategories">✕</span>
      </div>
      <div class="category-item active" data-category="home">
        <span class="category-name">Home</span>
        <span class="category-count" id="homeCount">0</span>
      </div>
      <div id="categoryItemsContainer">
        
      </div>
    </div>

    <main class="main-content">
      <div class="category-header">
        <div class="category-title-section">
          <h1 class="category-title" id="categoryTitle">Loading...</h1>
        </div>
      </div>

      <div id="gamesGrid"></div>
    </main>

    <footer class="footer">
      <div class="footer-links">
        <a href="/pages/privacy.html">Privacy Policy</a>
        <a href="/pages/terms.html">Terms of Use</a>
      </div>

      <div class="footer-copyright">
        <div class="footer-brand">seapeacez.com</div>
        <div class="footer-copyright-text">
          © 2026 seapeacez.com All Rights Reserved.
        </div>
      </div>
    </footer>

    <script type="module" src="../public/js/inpublic.js"></script>
  </body>
</html>
